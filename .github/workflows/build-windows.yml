name: Build SupaBoxPacker EXE

on:
  push:
    branches: [ main, master ]
    paths:
      - 'gui.py'
      - 'requirements.txt'
      - 'py3dbp/**'
      - '.github/workflows/build-windows.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --collect-all matplotlib --name SupaBoxPacker gui.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SupaBoxPacker-Windows
          path: dist/SupaBoxPacker.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: SupaBoxPacker v1.0.${{ github.run_number }}
          body: |
            Automated Windows build for SupaBoxPacker.

            Included:
            - SupaBoxPacker.exe
          files: dist/SupaBoxPacker.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}